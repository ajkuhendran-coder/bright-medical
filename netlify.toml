[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  included_files = [
    "email-templates/**/*.html",
    "email-templates/_assets/**",
  ]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # HTTPS erzwingen (Netlify leitet HTTP→HTTPS um; HSTS lässt Browser HTTP gar nicht erst versuchen).
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # Content-Security-Policy: Schutznetz gegen eingeschleustes Skript auf der Gesundheitsdaten-App.
    # Positivliste (inventarisiert): self + Supabase-Signed-URLs (Fotos/Audio) + data:/blob: (Foto-Vorschau,
    # PWA-Blob-Manifest). style 'unsafe-inline' nötig (React-Inline-Styles + Portal-<style>). Fonts lokal (self).
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.supabase.co; media-src 'self' blob: https://*.supabase.co; font-src 'self'; connect-src 'self' https://*.supabase.co; manifest-src 'self' blob:; worker-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
