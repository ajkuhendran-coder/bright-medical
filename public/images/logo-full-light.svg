<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <!-- BM Monogram -->
  <!-- Teal arc over the B -->
  <path d="M14 38 Q14 14 42 14" fill="none" stroke="#06B6D4" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Teal dot at the top of the arc -->
  <circle cx="44" cy="12" r="3.5" fill="#06B6D4"/>
  <!-- BM letters in navy bold -->
  <text x="10" y="62" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="40" fill="#0F2A55" letter-spacing="-1">BM</text>
  <!-- "Bright" in navy -->
  <text x="90" y="52" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="32" fill="#0F2A55">Bright</text>
  <!-- "Medical" in teal -->
  <text x="195" y="52" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="32" fill="#06B6D4">Medical</text>
</svg>
